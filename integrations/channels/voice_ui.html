<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jarvis — Voice Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & Variables ────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #070a0f;
    --surface:   #0d1117;
    --border:    #1a2332;
    --accent:    #00d4ff;
    --accent2:   #0077ff;
    --danger:    #ff3b5c;
    --text:      #c8d8e8;
    --text-dim:  #4a6070;
    --glow:      0 0 20px rgba(0,212,255,.25);
    --glow-lg:   0 0 60px rgba(0,212,255,.15);
    --radius:    6px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    overflow: hidden;
  }

  /* ── Layout ───────────────────────────────────────────── */
  .shell {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Header ───────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: .25em;
    color: var(--accent);
    text-shadow: var(--glow);
  }
  .logo span { color: var(--text-dim); }
  .user-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .uid-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    padding: 5px 10px;
    border-radius: var(--radius);
    width: 110px;
    outline: none;
    transition: border-color .2s;
  }
  .uid-input:focus { border-color: var(--accent); }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: .75rem;
    letter-spacing: .1em;
    padding: 5px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Transcript log ───────────────────────────────────── */
  .log {
    overflow-y: auto;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem;
    letter-spacing: .18em;
    color: var(--text-dim);
  }
  .msg.user .msg-label { color: var(--accent2); }
  .msg.jarvis .msg-label { color: var(--accent); }
  .msg-body {
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--text);
    border-left: 2px solid var(--border);
    padding-left: 12px;
  }
  .msg.user  .msg-body { border-color: var(--accent2); }
  .msg.jarvis .msg-body { border-color: var(--accent); }

  /* ── Orb ──────────────────────────────────────────────── */
  .orb-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 0 32px;
    border-top: 1px solid var(--border);
    gap: 18px;
  }

  .orb-wrap {
    position: relative;
    width: 88px;
    height: 88px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .orb {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #1a3a5c, #040c14);
    border: 1.5px solid var(--accent);
    box-shadow: var(--glow), inset 0 0 20px rgba(0,212,255,.08);
    transition: transform .15s, box-shadow .15s;
    position: relative;
  }
  .orb::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 1px solid rgba(0,212,255,.12);
  }

  /* State: idle */
  .orb-wrap.idle .orb {
    animation: pulse-idle 3s ease-in-out infinite;
  }
  @keyframes pulse-idle {
    0%, 100% { box-shadow: var(--glow), inset 0 0 20px rgba(0,212,255,.08); }
    50%       { box-shadow: 0 0 35px rgba(0,212,255,.35), inset 0 0 30px rgba(0,212,255,.12); }
  }

  /* State: recording */
  .orb-wrap.recording .orb {
    border-color: var(--danger);
    animation: pulse-rec .6s ease-in-out infinite;
  }
  @keyframes pulse-rec {
    0%, 100% { box-shadow: 0 0 20px rgba(255,59,92,.4), inset 0 0 20px rgba(255,59,92,.1); transform: scale(1); }
    50%       { box-shadow: 0 0 50px rgba(255,59,92,.7), inset 0 0 35px rgba(255,59,92,.2); transform: scale(1.04); }
  }

  /* State: thinking */
  .orb-wrap.thinking .orb {
    border-color: #ffaa00;
    animation: spin-think 1.8s linear infinite;
  }
  @keyframes spin-think {
    to { transform: rotate(360deg); }
  }

  /* State: speaking */
  .orb-wrap.speaking .orb {
    border-color: var(--accent);
    animation: wave-speak 1s ease-in-out infinite;
  }
  @keyframes wave-speak {
    0%, 100% { box-shadow: 0 0 30px rgba(0,212,255,.5), inset 0 0 25px rgba(0,212,255,.15); transform: scale(1); }
    50%       { box-shadow: 0 0 70px rgba(0,212,255,.8), inset 0 0 45px rgba(0,212,255,.25); transform: scale(1.06); }
  }

  /* Mic icon inside orb */
  .orb-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .orb-icon svg { width: 28px; height: 28px; }

  /* Status label */
  .status-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--text-dim);
    text-transform: uppercase;
    min-height: 1em;
    transition: color .3s;
  }
  .status-label.rec     { color: var(--danger); }
  .status-label.think   { color: #ffaa00; }
  .status-label.speak   { color: var(--accent); }

  /* Waveform bars (visible while recording) */
  .waveform {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 24px;
    opacity: 0;
    transition: opacity .3s;
  }
  .waveform.visible { opacity: 1; }
  .waveform .bar {
    width: 3px;
    background: var(--danger);
    border-radius: 2px;
    animation: bar-dance .6s ease-in-out infinite;
  }
  .waveform .bar:nth-child(2) { animation-delay: .1s; }
  .waveform .bar:nth-child(3) { animation-delay: .2s; }
  .waveform .bar:nth-child(4) { animation-delay: .1s; }
  .waveform .bar:nth-child(5) { animation-delay: .05s; }
  @keyframes bar-dance {
    0%, 100% { height: 6px; }
    50%       { height: 22px; }
  }

  /* hint text */
  .hint {
    font-size: .78rem;
    color: var(--text-dim);
    letter-spacing: .05em;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ── Header ─────────────────────────────────────── -->
  <header>
    <div class="logo">JARVIS<span> // VOICE</span></div>
    <div class="user-bar">
      <input class="uid-input" id="userId" type="number" placeholder="User ID" value="1" />
      <button class="btn-clear" id="btnClear">CLEAR</button>
    </div>
  </header>

  <!-- ── Log ────────────────────────────────────────── -->
  <div class="log" id="log">
    <div class="msg jarvis">
      <div class="msg-label">JARVIS // READY</div>
      <div class="msg-body">Tap the orb and speak. I'm listening.</div>
    </div>
  </div>

  <!-- ── Orb controls ───────────────────────────────── -->
  <div class="orb-zone">
    <div class="waveform" id="waveform">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>

    <div class="orb-wrap idle" id="orbWrap">
      <div class="orb"></div>
      <div class="orb-icon">
        <!-- mic SVG -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="rgba(0,212,255,.7)"/>
          <path d="M5 10a7 7 0 0 0 14 0" stroke="rgba(0,212,255,.7)" stroke-width="1.8"
                stroke-linecap="round" fill="none"/>
          <line x1="12" y1="17" x2="12" y2="21" stroke="rgba(0,212,255,.7)"
                stroke-width="1.8" stroke-linecap="round"/>
          <line x1="9" y1="21" x2="15" y2="21" stroke="rgba(0,212,255,.7)"
                stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="status-label" id="statusLabel">HOLD TO SPEAK</div>
    <div class="hint">or click once to toggle</div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════════
   Jarvis Voice Client
   Pipeline:  record → /voice → stream MP3 → Web Audio
   ═══════════════════════════════════════════════════════ */
const API_BASE     = window.location.origin;   // same origin as voice_server.py
const orbWrap      = document.getElementById('orbWrap');
const statusLabel  = document.getElementById('statusLabel');
const waveform     = document.getElementById('waveform');
const log          = document.getElementById('log');
const btnClear     = document.getElementById('btnClear');
const userIdInput  = document.getElementById('userId');

let mediaRecorder  = null;
let audioChunks    = [];
let isRecording    = false;
let isBusy         = false;         // true while thinking or speaking
let currentAudio   = null;          // AudioBufferSourceNode for stop-ability

// ── State machine ──────────────────────────────────────
function setState(s) {          // 'idle' | 'recording' | 'thinking' | 'speaking'
  orbWrap.className = `orb-wrap ${s}`;
  waveform.className = 'waveform' + (s === 'recording' ? ' visible' : '');
  const labels = {
    idle:      ['HOLD TO SPEAK', ''],
    recording: ['RECORDING...', 'rec'],
    thinking:  ['THINKING...', 'think'],
    speaking:  ['SPEAKING...', 'speak'],
  };
  statusLabel.textContent  = labels[s][0];
  statusLabel.className    = `status-label ${labels[s][1]}`;
}

// ── Append message to log ──────────────────────────────
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'YOU' : 'JARVIS'}</div>
    <div class="msg-body">${text}</div>`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ── Start recording ────────────────────────────────────
async function startRecording() {
  if (isBusy) return;
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  audioChunks  = [];
  mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
  mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
  mediaRecorder.start(100);
  isRecording = true;
  setState('recording');
}

// ── Stop recording & send ──────────────────────────────
async function stopAndSend() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  isBusy      = true;

  await new Promise(res => {
    mediaRecorder.onstop = res;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  });

  setState('thinking');

  const blob   = new Blob(audioChunks, { type: 'audio/webm' });
  const formData = new FormData();
  formData.append('audio',   blob,  'audio.webm');
  formData.append('user_id', userIdInput.value || '1');

  try {
    const resp = await fetch(`${API_BASE}/voice`, {
      method: 'POST',
      body:   formData,
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err);
    }

    // Show transcripts from headers
    const userText    = decodeURIComponent(resp.headers.get('X-User-Text')      || '');
    const jarvisText  = decodeURIComponent(resp.headers.get('X-Assistant-Text') || '');
    if (userText)   addMsg('user',   userText);
    if (jarvisText) addMsg('jarvis', jarvisText);

    // Stream audio chunks → decode → play in order
    setState('speaking');
    await streamAndPlay(resp.body);

  } catch (err) {
    console.error(err);
    addMsg('jarvis', `⚠ Error: ${err.message}`);
  }

  isBusy = false;
  setState('idle');
}

// ── Stream MP3 → Web Audio (low-latency playback) ──────
async function streamAndPlay(body) {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const reader   = body.getReader();
  let   accumulated = new Uint8Array(0);
  let   startTime   = audioCtx.currentTime;
  let   started     = false;
  const MIN_BYTES   = 32 * 1024;    // decode first chunk after 32 KB

  function concat(a, b) {
    const c = new Uint8Array(a.length + b.length);
    c.set(a); c.set(b, a.length);
    return c;
  }

  async function decodeAndQueue(bytes) {
    try {
      const buffer = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
      const src    = audioCtx.createBufferSource();
      src.buffer   = buffer;
      src.connect(audioCtx.destination);
      currentAudio = src;
      if (!started) {
        startTime = audioCtx.currentTime;
        started   = true;
      }
      src.start(startTime);
      startTime += buffer.duration;
    } catch (_) { /* partial chunk — accumulate more */ }
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) {
      if (accumulated.length) await decodeAndQueue(accumulated);
      break;
    }
    accumulated = concat(accumulated, value);
    if (accumulated.length >= MIN_BYTES) {
      const chunk  = accumulated;
      accumulated  = new Uint8Array(0);
      await decodeAndQueue(chunk);
    }
  }

  // Wait for all queued audio to finish
  const remaining = Math.max(0, startTime - audioCtx.currentTime);
  if (remaining > 0) await new Promise(r => setTimeout(r, remaining * 1000 + 200));
  await audioCtx.close();
}

// ── Orb interaction (click-toggle + hold) ─────────────
let holdTimer = null;

orbWrap.addEventListener('pointerdown', () => {
  holdTimer = setTimeout(() => {
    holdTimer = null;
    startRecording();
  }, 120);   // slight delay to distinguish tap from hold
});

orbWrap.addEventListener('pointerup', () => {
  if (holdTimer) {
    clearTimeout(holdTimer);
    holdTimer = null;
    // It was a quick tap → toggle
    if (!isRecording && !isBusy) startRecording();
    else if (isRecording)        stopAndSend();
  } else {
    // Was a hold → release stops
    if (isRecording) stopAndSend();
  }
});

orbWrap.addEventListener('pointercancel', () => {
  if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  if (isRecording) stopAndSend();
});

// ── Keyboard shortcut: Space to push-to-talk ──────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    if (!isRecording && !isBusy) startRecording();
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' && isRecording) {
    e.preventDefault();
    stopAndSend();
  }
});

// ── Clear conversation ─────────────────────────────────
btnClear.addEventListener('click', async () => {
  const fd = new FormData();
  fd.append('user_id', userIdInput.value || '1');
  await fetch(`${API_BASE}/clear`, { method: 'POST', body: fd });
  log.innerHTML = `
    <div class="msg jarvis">
      <div class="msg-label">JARVIS // RESET</div>
      <div class="msg-body">Conversation cleared. Start fresh.</div>
    </div>`;
});
</script>
</body>
</html>
